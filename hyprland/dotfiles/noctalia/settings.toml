config_version = 1

[bar]
order = [ "default", "bar" ]

    [bar.bar]
    border = "tertiary"
    border_width = 2.0
    center = [ "audio_visualizer", "spacer", "clock", "spacer", "date" ]
    enabled = true
    end = [ "tray", "volume", "cpu-temp", "gpu-temp" ]
    font_weight = 900
    margin_ends = 0
    start = [ "launcher", "workspaces" ]

        [bar.bar.monitor.DP-1]
        enabled = false

    [bar.default]
    border = "tertiary"
    border_width = 2.0
    center = [ "active_window", "spacer", "clock", "spacer", "date" ]
    font_weight = 700
    margin_ends = 0

        [bar.default.monitor.DP-3]
        enabled = false

[control_center]
sidebar = "full"
sidebar_section = "full"
width = 1000

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[location]
address = ""
auto_locate = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-3", "lockscreen-login-box@DP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 2560.0
    cy = 1321.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 70.0
    box_width = 400.0
    cx = 540.0
    cy = 1801.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
temperature_night = 5500

[plugins]
enabled = [ "noctalia/kaomoji" ]

[shell]
screen_time_enabled = true

    [shell.panel]
    clipboard_placement = "attached"
    launcher_placement = "attached"
    open_near_click_clipboard = true
    open_near_click_wallpaper = true
    polkit_placement = "attached"

[system.monitor]
gpu_poll_seconds = 5

[theme]
builtin = "Tokyo-Night"
community_palette = "Occult Umbral"
custom_palette = "Carmine"
source = "custom"
wallpaper_scheme = "m3-monochrome"

[wallpaper]
directory = "/home/musiba/Pictures/wallpapers"

    [wallpaper.default]
    path = "/home/musiba/Pictures/wallpapers/Night monochrome.jpg"

    [wallpaper.last]
    path = "/home/musiba/Pictures/wallpapers/Night monochrome.jpg"

    [wallpaper.monitors.DP-1]
    path = "/home/musiba/Pictures/wallpapers/Night monochrome.jpg"

    [wallpaper.monitors.DP-3]
    path = "/home/musiba/Pictures/wallpapers/Night monochrome.jpg"

[widget.active_window]
max_length = 700
title_scroll = "on_hover"

[widget.clock]
anchor = true
capsule = true
format = "{:%H:%M:%S}"

[widget.cpu-temp]
display = "graph"
stat = "cpu_temp"
type = "sysmon"

[widget.gpu-temp]
display = "graph"
stat = "gpu_temp"
type = "sysmon"

[widget.media]
album_art_only = true

[widget.temp]
display = "graph"